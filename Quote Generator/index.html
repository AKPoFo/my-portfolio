<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quote-box">
    <div class="quote-area">
        <p id="quote">"Press the button to get inspired."</p>
        <small id="author">- Your Future Boss</small>
    </div>
    
    <div class="actions">
        <button id="newQuoteBtn" onclick="getQuote()">New Quote</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
